<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Invoice Vouchers</title>
    <link rel="stylesheet" href="/css/tailwind.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto max-w-4xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="rounded-2xl border border-slate-200 bg-white shadow-sm">
            <div class="border-b border-slate-200 px-6 py-5">
                <p class="text-xs font-bold uppercase tracking-wider text-slate-500">Post-Submit Step</p>
                <h1 class="mt-1 text-2xl font-bold text-slate-900">Edit Vouchers</h1>
                <p id="invoiceMeta" class="mt-1 text-sm text-slate-600">Loading quotation info...</p>
            </div>

            <div id="loadingState" class="px-6 py-10 text-sm text-slate-500">Loading voucher groups...</div>
            <div id="errorState" class="hidden px-6 py-10">
                <p id="errorText" class="text-sm font-medium text-red-600"></p>
            </div>
            <div id="emptyState" class="hidden px-6 py-10 text-sm text-slate-500">
                No active voucher groups are available for this quotation.
            </div>

            <div id="categoryList" class="hidden space-y-4 px-6 py-6"></div>

            <div class="flex flex-col gap-3 border-t border-slate-200 bg-slate-50 px-6 py-4 sm:flex-row sm:items-center sm:justify-between">
                <p id="selectionSummary" class="text-sm text-slate-600">No vouchers selected.</p>
                <div class="flex items-center gap-2">
                    <button id="skipBtn" type="button" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">
                        Skip
                    </button>
                    <button id="applyBtn" type="button" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">
                        Apply and Continue
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/pages/invoice_vouchers.js"></script>
</body>
</html>
