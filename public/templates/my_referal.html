<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Referrals | ETERNALGY OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: #0f172a; color: #f1f5f9; }
        .card { background: #1e293b; border: 1px solid #334155; }
        .card:hover { border-color: #475569; }
        .status-pill { display: inline-flex; align-items: center; gap: 0.35rem; border-radius: 9999px; padding: 0.35rem 0.75rem; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.04em; }
    </style>
</head>
<body class="min-h-screen">
    
    <!-- Header -->
    <div class="bg-slate-900 border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/agent/home" class="text-slate-400 hover:text-white transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </a>
                    <h1 class="text-2xl font-bold text-white">My Referrals</h1>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-400">Total Commission Earned</p>
                    <p class="text-2xl font-bold text-emerald-400" id="totalCommission">RM 0.00</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="card rounded-2xl p-5 col-span-2">
                <p class="text-slate-400 text-sm mb-1">Total Referrals</p>
                <p class="text-3xl font-bold text-white" id="totalCount">0</p>
            </div>
            <div class="card rounded-2xl p-5">
                <p class="text-slate-400 text-sm mb-1">Pending</p>
                <p class="text-3xl font-bold text-yellow-400" id="pendingCount">0</p>
            </div>
            <div class="card rounded-2xl p-5">
                <p class="text-slate-400 text-sm mb-1">Contacted</p>
                <p class="text-3xl font-bold text-blue-400" id="contactedCount">0</p>
            </div>
            <div class="card rounded-2xl p-5">
                <p class="text-slate-400 text-sm mb-1">Successful</p>
                <p class="text-3xl font-bold text-emerald-400" id="successfulCount">0</p>
            </div>
            <div class="card rounded-2xl p-5">
                <p class="text-slate-400 text-sm mb-1">Declined</p>
                <p class="text-3xl font-bold text-rose-400" id="declinedCount">0</p>
            </div>
        </div>
        
        <!-- Filters -->
        <div class="card rounded-2xl p-4 mb-6">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="filterStatus('all', this)" class="filter-btn active px-4 py-3 rounded-xl text-sm font-semibold transition">All</button>
                <button onclick="filterStatus('Pending', this)" class="filter-btn px-4 py-3 rounded-xl text-sm font-semibold transition">Pending</button>
                <button onclick="filterStatus('Contacted', this)" class="filter-btn px-4 py-3 rounded-xl text-sm font-semibold transition">Contacted</button>
                <button onclick="filterStatus('Successful', this)" class="filter-btn px-4 py-3 rounded-xl text-sm font-semibold transition">Successful</button>
                <button onclick="filterStatus('Declined', this)" class="filter-btn px-4 py-3 rounded-xl text-sm font-semibold transition col-span-2">Declined</button>
            </div>
        </div>
        
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <svg class="animate-spin h-12 w-12 text-blue-500 mx-auto mb-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-slate-400">Loading referrals...</p>
        </div>
        
        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <svg class="w-24 h-24 text-slate-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <p class="text-slate-400 text-lg">No referrals yet</p>
        </div>
        
        <!-- Referrals List -->
        <div id="referralsTable" class="hidden space-y-4">
            <div id="referralsList" class="space-y-4">
                <!-- Cards populated by JS -->
            </div>
        </div>
        
    </div>
    
    <script>
        let allReferrals = [];
        let currentFilter = 'all';

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escapeAttribute(value) {
            return escapeHtml(value);
        }

        function formatCurrency(value) {
            const amount = parseFloat(value || 0);
            if (amount <= 0) return '-';
            return `RM ${amount.toFixed(2)}`;
        }

        function formatDate(value) {
            if (!value) return '-';
            return new Date(value).toLocaleDateString('en-MY');
        }

        function getStatusClass(status) {
            const statusColors = {
                'Pending': 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30',
                'Contacted': 'bg-blue-500/20 text-blue-400 border border-blue-500/30',
                'Successful': 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30',
                'Declined': 'bg-red-500/20 text-red-400 border border-red-500/30'
            };

            return statusColors[status] || 'bg-slate-500/20 text-slate-300 border border-slate-500/30';
        }

        function hasInvoiceShortcut(referral) {
            const linkedInvoice = String(referral?.linked_invoice || '').trim();
            if (!linkedInvoice) return false;
            if (linkedInvoice.startsWith('cust_')) return false;
            return true;
        }

        function syncFilterButtons(activeStatus) {
            document.querySelectorAll('.filter-btn').forEach((btn) => {
                const isActive = btn.textContent.trim().toLowerCase() === activeStatus.toLowerCase()
                    || (activeStatus === 'all' && btn.textContent.trim().toLowerCase() === 'all');
                btn.classList.toggle('active', isActive);
                btn.classList.toggle('bg-blue-600', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('text-slate-400', !isActive);
                btn.classList.toggle('bg-slate-700', !isActive);
            });
        }
        
        // Load referrals
        document.addEventListener('DOMContentLoaded', loadReferrals);
        
        async function loadReferrals() {
            try {
                const response = await fetch('/api/v1/referrals/my-referrals');
                const result = await response.json();
                
                if (result.success) {
                    allReferrals = result.data;
                    displayReferrals();
                } else {
                    throw new Error(result.error || 'Failed to load referrals');
                }
            } catch (err) {
                console.error('Error loading referrals:', err);
                document.getElementById('loadingState').classList.add('hidden');
                Swal.fire({ icon: 'error', title: 'Error', text: err.message, background: '#1e293b', color: '#f1f5f9' });
            }
        }
        
        function displayReferrals() {
            document.getElementById('loadingState').classList.add('hidden');
            
            const filtered = currentFilter === 'all' ? allReferrals : allReferrals.filter(r => r.status === currentFilter);
            
            if (filtered.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                document.getElementById('referralsTable').classList.add('hidden');
                updateStats();
                return;
            }
            
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('referralsTable').classList.remove('hidden');
            
            const list = document.getElementById('referralsList');
            list.innerHTML = filtered.map((referral) => {
                const invoiceButton = hasInvoiceShortcut(referral) ? `
                    <a href="/invoice-office?id=${encodeURIComponent(referral.linked_invoice)}" class="flex-1 rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-center text-xs font-bold uppercase tracking-[0.14em] text-emerald-300 transition hover:bg-emerald-500/20">
                        Open Invoice
                    </a>
                ` : '';

                return `
                    <article class="card rounded-2xl p-4 shadow-sm">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <p class="text-[11px] font-bold uppercase tracking-[0.22em] text-slate-500">Referral Lead</p>
                                <h3 class="mt-1 text-lg font-bold text-white break-words">${escapeHtml(referral.name || '-')}</h3>
                                <p class="mt-1 text-sm text-slate-300">${escapeHtml(referral.mobile_number || '-')}</p>
                            </div>
                            <span class="status-pill ${getStatusClass(referral.status)}">${escapeHtml(referral.status || 'Pending')}</span>
                        </div>

                        <div class="mt-4 grid grid-cols-2 gap-3 text-sm">
                            <div class="rounded-xl bg-slate-800/70 px-3 py-3">
                                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Customer</p>
                                <p class="mt-1 font-semibold text-slate-100 break-words">${escapeHtml(referral.customer_name || '-')}</p>
                            </div>
                            <div class="rounded-xl bg-slate-800/70 px-3 py-3">
                                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Relationship</p>
                                <p class="mt-1 font-semibold text-slate-100 break-words">${escapeHtml(referral.relationship || '-')}</p>
                            </div>
                            <div class="rounded-xl bg-slate-800/70 px-3 py-3">
                                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Commission</p>
                                <p class="mt-1 font-semibold ${parseFloat(referral.commission_earned || 0) > 0 ? 'text-emerald-300' : 'text-slate-400'}">${formatCurrency(referral.commission_earned)}</p>
                            </div>
                            <div class="rounded-xl bg-slate-800/70 px-3 py-3">
                                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-slate-500">Created</p>
                                <p class="mt-1 font-semibold text-slate-100">${formatDate(referral.created_at)}</p>
                            </div>
                        </div>

                        ${invoiceButton ? `
                            <div class="mt-3 rounded-xl border border-emerald-500/20 bg-emerald-500/5 px-3 py-2">
                                <p class="text-[10px] font-bold uppercase tracking-[0.18em] text-emerald-300">Linked Invoice</p>
                                <p class="mt-1 text-xs text-emerald-100 break-all">${escapeHtml(referral.linked_invoice)}</p>
                            </div>
                        ` : ''}

                        <div class="mt-4 flex gap-3">
                            <button onclick="updateStatus('${escapeAttribute(referral.bubble_id)}')" class="flex-1 rounded-xl bg-blue-600 px-4 py-3 text-xs font-bold uppercase tracking-[0.14em] text-white transition hover:bg-blue-700">
                                Update Status
                            </button>
                            ${invoiceButton}
                        </div>
                    </article>
                `;
            }).join('');
            
            updateStats();
        }
        
        function updateStats() {
            const total = allReferrals.length;
            const pending = allReferrals.filter(r => r.status === 'Pending').length;
            const contacted = allReferrals.filter(r => r.status === 'Contacted').length;
            const successful = allReferrals.filter(r => r.status === 'Successful').length;
            const declined = allReferrals.filter(r => r.status === 'Declined').length;
            const totalCommission = allReferrals.reduce((sum, r) => sum + parseFloat(r.commission_earned || 0), 0);
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('contactedCount').textContent = contacted;
            document.getElementById('successfulCount').textContent = successful;
            document.getElementById('declinedCount').textContent = declined;
            document.getElementById('totalCommission').textContent = `RM ${totalCommission.toFixed(2)}`;
        }
        
        function filterStatus(status, button) {
            currentFilter = status;
            syncFilterButtons(status);
            displayReferrals();
        }
        
        async function updateStatus(bubbleId) {
            const referral = allReferrals.find(r => r.bubble_id === bubbleId);
            
            const { value: formValues } = await Swal.fire({
                title: 'Update Referral Status',
                html: `
                    <div class="text-left space-y-4">
                        <div>
                            <label class="block text-sm font-semibold mb-2">Status</label>
                            <select id="status" class="w-full px-4 py-2 border rounded-lg bg-slate-800 text-white border-slate-600">
                                <option value="Pending" ${referral.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Contacted" ${referral.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
                                <option value="Successful" ${referral.status === 'Successful' ? 'selected' : ''}>Successful</option>
                                <option value="Declined" ${referral.status === 'Declined' ? 'selected' : ''}>Declined</option>
                            </select>
                        </div>
                        <div id="dealValueDiv" style="display: none;">
                            <label class="block text-sm font-semibold mb-2">Deal Value (RM)</label>
                            <input type="number" id="dealValue" class="w-full px-4 py-2 border rounded-lg bg-slate-800 text-white border-slate-600" placeholder="e.g., 50000">
                            <p class="text-xs text-slate-400 mt-1">2% commission will be calculated</p>
                        </div>
                    </div>
                `,
                background: '#1e293b',
                color: '#f1f5f9',
                showCancelButton: true,
                confirmButtonText: 'Update',
                confirmButtonColor: '#3b82f6',
                didOpen: () => {
                    const statusSelect = document.getElementById('status');
                    const dealValueDiv = document.getElementById('dealValueDiv');
                    
                    statusSelect.addEventListener('change', () => {
                        dealValueDiv.style.display = statusSelect.value === 'Successful' ? 'block' : 'none';
                    });
                    
                    if (statusSelect.value === 'Successful') {
                        dealValueDiv.style.display = 'block';
                    }
                },
                preConfirm: () => {
                    const status = document.getElementById('status').value;
                    const dealValue = document.getElementById('dealValue').value;
                    
                    if (status === 'Successful' && (!dealValue || dealValue <= 0)) {
                        Swal.showValidationMessage('Please enter a valid deal value');
                        return false;
                    }
                    
                    return { status, dealValue: dealValue ? parseFloat(dealValue) : null };
                }
            });
            
            if (formValues) {
                try {
                    const response = await fetch(`/api/v1/referrals/${bubbleId}/status`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formValues)
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        await Swal.fire({
                            icon: 'success',
                            title: 'Updated!',
                            text: 'Referral status updated successfully',
                            background: '#1e293b',
                            color: '#f1f5f9',
                            confirmButtonColor: '#3b82f6'
                        });
                        loadReferrals();
                    } else {
                        throw new Error(result.error || 'Failed to update');
                    }
                } catch (err) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: err.message,
                        background: '#1e293b',
                        color: '#f1f5f9',
                        confirmButtonColor: '#3b82f6'
                    });
                }
            }
        }
        
        // Style filter buttons on load
        document.addEventListener('DOMContentLoaded', () => {
            syncFilterButtons('all');
        });
    </script>
    <script src="/js/navigation.js"></script>
</body>
</html>
