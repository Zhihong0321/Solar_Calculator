<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Shared Access | ETERNALGY OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-900: #0f172a;
            --brand: #2563eb;
        }

        * {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: var(--slate-50);
            color: var(--slate-900);
            overflow-x: hidden;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            color: var(--slate-600);
            font-weight: 700;
            font-size: 0.875rem;
            transition: all 0.15s ease;
        }

        .nav-link:hover {
            background: var(--slate-50);
            color: var(--slate-900);
        }

        .nav-link.active {
            background: var(--slate-900);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(15, 23, 42, 0.18);
        }

        .inbox-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--slate-200);
            background: white;
            color: var(--slate-600);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            font-weight: 800;
            min-height: 44px;
            transition: all 0.15s ease;
        }

        .inbox-pill.active {
            border-color: var(--slate-900);
            background: var(--slate-900);
            color: white;
        }

        .email-item {
            border-bottom: 1px solid var(--slate-100);
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .email-item:hover,
        .email-item.active {
            background: #eff6ff;
        }

        @media (max-width: 768px) {
            .desktop-sidebar {
                display: none;
            }

            main {
                margin-left: 0 !important;
            }

            #emailDetailContainer {
                position: fixed;
                inset: 73px 0 0 0;
                z-index: 90;
                background: white;
            }
        }
    </style>
</head>

<body class="flex">
    <aside class="desktop-sidebar hidden md:flex flex-col w-64 fixed h-full z-20 p-6 bg-white border-r border-slate-200">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
                <i class="fa-solid fa-bolt text-lg"></i>
            </div>
            <span class="text-lg font-bold tracking-tight text-slate-900">ETERNALGY OS</span>
        </div>

        <nav class="space-y-1 flex-1">
            <a href="/agent/home" class="nav-link">
                <i class="fa-solid fa-house-chimney w-5"></i>
                <span>Dashboard</span>
            </a>
            <a href="/my-emails" class="nav-link">
                <i class="fa-solid fa-envelope w-5"></i>
                <span>Official Email</span>
            </a>
            <a href="/shared-email-access" class="nav-link active">
                <i class="fa-solid fa-inbox w-5"></i>
                <span>Shared Access</span>
            </a>
        </nav>

        <div class="mt-auto pt-6">
            <a href="/agent/profile" class="nav-link">
                <i class="fa-solid fa-user-gear w-5"></i>
                <span>Settings</span>
            </a>
        </div>
    </aside>

    <main class="flex-1 w-full md:ml-64 flex flex-col min-h-screen">
        <header class="sticky top-0 z-[100] flex items-center justify-between gap-4 border-b border-slate-200 bg-white px-4 py-4 md:px-6">
            <div class="min-w-0">
                <p class="text-[10px] font-black uppercase tracking-[0.24em] text-slate-400">Shared Access</p>
                <h1 id="currentInboxTitle" class="truncate text-sm font-extrabold text-slate-900 md:text-lg">Loading inboxes...</h1>
            </div>
            <button onclick="refreshSharedInbox()" class="shrink-0 rounded-lg bg-slate-100 px-3 py-2 text-slate-600 hover:bg-slate-200" title="Refresh">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </header>

        <section class="border-b border-slate-200 bg-white px-4 py-3 md:px-6">
            <div id="sharedInboxSwitch" class="flex gap-2 overflow-x-auto pb-1"></div>
        </section>

        <div class="flex flex-1 overflow-hidden">
            <section id="emailListContainer" class="w-full border-r border-slate-200 bg-white md:w-[38%] lg:w-1/3">
                <div id="emailList" class="h-[calc(100vh-137px)] overflow-y-auto">
                    <div class="p-10 text-center">
                        <i class="fa-solid fa-inbox text-4xl text-slate-100 mb-4"></i>
                        <p class="text-sm font-semibold text-slate-400">Select an inbox</p>
                    </div>
                </div>
            </section>

            <section id="emailDetailContainer" class="hidden flex-1 overflow-y-auto bg-white md:block h-[calc(100vh-137px)]">
                <div class="md:hidden border-b border-slate-100 bg-slate-50 px-4 py-3">
                    <button onclick="closeEmailDetail()" class="flex items-center gap-2 text-sm font-bold text-slate-600">
                        <i class="fa-solid fa-chevron-left"></i>
                        <span>Back to List</span>
                    </button>
                </div>
                <div id="emailDetail" class="p-4 md:p-8">
                    <div class="hidden p-20 text-center md:block">
                        <i class="fa-solid fa-envelope-open text-4xl text-slate-100 mb-4"></i>
                        <p class="text-sm font-semibold text-slate-400">Open an email</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        let sharedAccounts = [];
        let currentEmail = null;
        let selectedEmailId = null;

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function jsString(value) {
            return JSON.stringify(String(value ?? ''));
        }

        function jsAttrString(value) {
            return escapeHtml(jsString(value));
        }

        function formatEmailDate(value) {
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '' : date.toLocaleDateString();
        }

        function buildAttachmentDownloadUrl(email, attachment) {
            const emailId = encodeURIComponent(String(email?.email_id || email?.id || ''));
            const filename = encodeURIComponent(String(attachment?.filename || ''));
            return `https://ee-mail-production.up.railway.app/attachments/${emailId}/${filename}/download`;
        }

        function renderEmailBody(email) {
            const body = document.getElementById('emailBodyContent');
            if (!body) return;
            body.textContent = '';

            if (email.html_content) {
                const frame = document.createElement('iframe');
                frame.className = 'w-full min-h-[420px] border-0';
                frame.setAttribute('sandbox', '');
                frame.setAttribute('referrerpolicy', 'no-referrer');
                frame.srcdoc = String(email.html_content);
                body.appendChild(frame);
                return;
            }

            const text = document.createElement('div');
            text.className = 'whitespace-pre-wrap';
            text.textContent = email.text_content || '';
            body.appendChild(text);
        }

        function closeEmailDetail() {
            const container = document.getElementById('emailDetailContainer');
            if (container) container.classList.add('hidden');
        }

        async function loadSharedAccounts() {
            const switcher = document.getElementById('sharedInboxSwitch');
            try {
                const response = await fetch('/api/email/shared/accounts');
                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'Failed to load shared inboxes');

                sharedAccounts = data.accounts || [];
                renderSharedAccounts();

                if (sharedAccounts.length > 0) {
                    selectSharedInbox(sharedAccounts[0].full_email);
                } else {
                    switcher.innerHTML = '<p class="text-xs font-bold text-slate-400">No shared inboxes configured</p>';
                    document.getElementById('currentInboxTitle').textContent = 'No shared inboxes';
                }
            } catch (err) {
                switcher.innerHTML = `<p class="text-xs font-bold text-red-500">${escapeHtml(err.message)}</p>`;
                document.getElementById('currentInboxTitle').textContent = 'Shared Access unavailable';
            }
        }

        function renderSharedAccounts() {
            const switcher = document.getElementById('sharedInboxSwitch');
            switcher.innerHTML = sharedAccounts.map(account => `
                <button onclick='selectSharedInbox(${jsAttrString(account.full_email)})'
                    class="inbox-pill ${currentEmail === account.full_email ? 'active' : ''}">
                    <i class="fa-solid fa-inbox"></i>
                    <span>${escapeHtml(account.label || account.full_email)}</span>
                </button>
            `).join('');
        }

        function selectSharedInbox(email) {
            currentEmail = email;
            selectedEmailId = null;
            const account = sharedAccounts.find(item => item.full_email === email);
            document.getElementById('currentInboxTitle').textContent = account?.full_email || email;
            renderSharedAccounts();
            closeEmailDetail();
            loadSharedInbox();
        }

        async function loadSharedInbox() {
            if (!currentEmail) return;
            const list = document.getElementById('emailList');
            list.innerHTML = '<div class="p-10 text-center"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-slate-200"></i></div>';

            try {
                const response = await fetch(`/api/email/shared/received?email=${encodeURIComponent(currentEmail)}`);
                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'Failed to load shared inbox');
                renderSharedEmails(data.emails || []);
            } catch (err) {
                list.innerHTML = `<div class="p-10 text-center text-xs font-bold text-red-500">${escapeHtml(err.message)}</div>`;
            }
        }

        function renderSharedEmails(emails) {
            const list = document.getElementById('emailList');
            if (emails.length === 0) {
                list.innerHTML = `
                    <div class="p-10 text-center">
                        <i class="fa-solid fa-inbox text-4xl text-slate-100 mb-4"></i>
                        <p class="text-sm font-semibold text-slate-400">No emails found</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = emails.map(email => `
                <button onclick='loadSharedEmailDetail(${jsAttrString(email.id)})'
                    class="email-item ${selectedEmailId === String(email.id) ? 'active' : ''} block w-full p-4 text-left"
                    data-email-id="${escapeHtml(email.id)}">
                    <div class="flex items-start justify-between gap-3">
                        <span class="min-w-0 truncate text-xs font-extrabold text-slate-900">${escapeHtml(email.from_email)}</span>
                        <span class="shrink-0 text-[9px] font-bold uppercase text-slate-400">${formatEmailDate(email.received_at || email.sent_at)}</span>
                    </div>
                    <p class="mt-1 truncate text-[11px] font-bold text-slate-700">${escapeHtml(email.subject || '(No Subject)')}</p>
                    <p class="mt-1 line-clamp-2 text-[10px] text-slate-400">${escapeHtml(email.text_content || '...')}</p>
                </button>
            `).join('');
        }

        async function loadSharedEmailDetail(id) {
            selectedEmailId = String(id);
            Array.from(document.querySelectorAll('.email-item')).forEach(item => {
                item.classList.toggle('active', item.dataset.emailId === selectedEmailId);
            });

            const detail = document.getElementById('emailDetail');
            const container = document.getElementById('emailDetailContainer');
            container.classList.remove('hidden');
            container.scrollTop = 0;
            detail.innerHTML = '<div class="p-20 text-center"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-slate-200"></i></div>';

            try {
                const response = await fetch(`/api/email/shared/details/${encodeURIComponent(id)}?email=${encodeURIComponent(currentEmail)}`);
                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'Failed to load email');
                renderSharedEmailDetail(data.email);
            } catch (err) {
                detail.innerHTML = `<div class="p-10 text-center text-xs font-bold text-red-500">${escapeHtml(err.message)}</div>`;
            }
        }

        function renderSharedEmailDetail(email) {
            const detail = document.getElementById('emailDetail');
            detail.innerHTML = `
                <div class="space-y-6">
                    <div>
                        <h2 class="text-lg font-extrabold leading-tight text-slate-900 md:text-xl">${escapeHtml(email.subject || '(No Subject)')}</h2>
                        <div class="mt-4 flex items-center gap-3 rounded-xl border border-slate-100 bg-slate-50 p-3">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(email.from_email || 'Shared')}&background=random" class="h-8 w-8 flex-shrink-0 rounded-full">
                            <div class="min-w-0 flex-1">
                                <p class="truncate text-xs font-bold text-slate-900">${escapeHtml(email.from_email)}</p>
                                <p class="truncate text-[10px] font-medium text-slate-400">To: ${escapeHtml(email.to_email)}</p>
                            </div>
                            <span class="shrink-0 text-[9px] font-bold uppercase text-slate-400">${formatEmailDate(email.date || email.received_at)}</span>
                        </div>
                    </div>

                    <div class="h-px bg-slate-200"></div>

                    <div class="email-body overflow-x-auto text-sm leading-relaxed text-slate-700">
                        <div id="emailBodyContent"></div>
                    </div>

                    ${email.attachments && email.attachments.length > 0 ? `
                        <div class="border-t border-slate-100 pt-6">
                            <h3 class="mb-3 text-[10px] font-bold uppercase tracking-widest text-slate-400">Attachments</h3>
                            <div class="flex flex-wrap gap-2">
                                ${email.attachments.map(attachment => `
                                    <a href="${escapeHtml(buildAttachmentDownloadUrl(email, attachment))}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-xs font-bold text-slate-600 hover:bg-slate-100">
                                        <i class="fa-solid fa-file"></i>
                                        <span class="max-w-[150px] truncate">${escapeHtml(attachment.filename || 'Attachment')}</span>
                                        <i class="fa-solid fa-download ml-2 text-[10px] text-slate-400"></i>
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            renderEmailBody(email);
        }

        function refreshSharedInbox() {
            loadSharedInbox();
        }

        document.addEventListener('DOMContentLoaded', loadSharedAccounts);
    </script>
    <script src="/js/navigation.js"></script>
</body>

</html>
