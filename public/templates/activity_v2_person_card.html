<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Person · Live Board | ETERNALGY OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --ink: #0B0F17;
      --ink-soft: #374151;
      --muted: #6B7280;
      --hair: #E7E3DB;
      --paper: #FAFAF7;
      --surface: #FFFFFF;
      --revenue: #059669;
      --support: #B45309;
      --offline: #C2410C;
      --gap: #E7E3DB;
    }
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--paper); color: var(--ink); }
    .serif { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
    .tabular { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .hair { border-color: var(--hair); }

    .topbar { background: var(--paper); border-bottom: 1px solid var(--hair); }
    .pill-back {
      width: 40px; height: 40px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ink-soft);
    }
    .pill-back:hover { background: var(--hair); }

    /* Avatar */
    .avatar {
      width: 64px; height: 64px; border-radius: 999px;
      display: inline-flex; align-items: center; justify-content: center;
      color: white;
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 24px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #065F46, #0F766E 40%, #115E59);
      box-shadow: inset 0 -2px 8px rgba(0,0,0,0.10), 0 4px 18px rgba(6,95,70,0.22);
    }

    .live-pulse {
      width: 10px; height: 10px; border-radius: 999px;
      background: #10B981;
      box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.55);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.55); }
      50%      { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
    }

    /* Date scrubber */
    .scrubber {
      display: flex; gap: 6px; overflow-x: auto;
      padding: 2px; margin: 0 -4px;
      scrollbar-width: none;
    }
    .scrubber::-webkit-scrollbar { display: none; }
    .scrubber-pill {
      flex: 0 0 auto;
      min-width: 52px;
      padding: 8px 12px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--hair);
      text-align: center;
      cursor: pointer;
      transition: all .18s ease;
      user-select: none;
    }
    .scrubber-pill:hover { border-color: #D4CEC0; }
    .scrubber-pill.active {
      background: var(--ink);
      border-color: var(--ink);
      color: white;
    }
    .scrubber-dow { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; opacity: .7; }
    .scrubber-day { font-family: 'Fraunces', serif; font-weight: 500; font-size: 18px; letter-spacing: -0.02em; }

    /* Rhythm Ribbon */
    .ribbon-wrap {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--hair);
      border-radius: 16px;
      padding: 18px 16px 14px;
    }
    .ribbon {
      position: relative;
      height: 44px;
      border-radius: 10px;
      background-image: repeating-linear-gradient(
        -45deg,
        #F1EBDE 0,
        #F1EBDE 6px,
        #FAFAF7 6px,
        #FAFAF7 12px
      );
      overflow: hidden;
    }
    .ribbon-seg {
      position: absolute;
      top: 0; bottom: 0;
      border-radius: 3px;
      transition: all .3s ease;
    }
    .ribbon-seg.revenue { background: linear-gradient(180deg, #10B981, #059669); }
    .ribbon-seg.support { background: linear-gradient(180deg, #D4A373, #B45309); }
    .ribbon-seg.offline { background: linear-gradient(180deg, #F97316, #C2410C); }
    .ribbon-seg.live::after {
      content: '';
      position: absolute; top: 0; right: 0; bottom: 0; width: 3px;
      background: rgba(255,255,255,0.9);
      animation: livePulse 1.6s ease-in-out infinite;
    }
    @keyframes livePulse { 0%,100%{opacity:.3}50%{opacity:1} }

    .ribbon-axis {
      display: flex; justify-content: space-between;
      margin-top: 8px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted);
    }

    /* Stat triplet */
    .stat-row {
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .stat-num {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 36px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .stat-label { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }

    /* Narrative */
    .narrative {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 18px;
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 62ch;
    }
    .narrative .hi { color: var(--ink); font-style: normal; font-weight: 600; }
    .narrative .tm { color: var(--revenue); font-style: normal; font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Journey timeline */
    .journey {
      position: relative;
      padding-left: 0;
    }
    .jrow {
      position: relative;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 14px;
      padding: 14px 0;
      cursor: pointer;
    }
    .jrow + .jrow { border-top: 1px dashed var(--hair); }
    .jtime {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--ink);
      line-height: 1;
      padding-top: 2px;
    }
    .jtime-end { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; margin-top: 4px; }

    .jtitle { font-size: 14.5px; font-weight: 700; color: var(--ink); letter-spacing: 0.01em; }
    .jtag {
      display: inline-block; margin-left: 8px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 999px;
      vertical-align: 2px;
    }
    .jtag.revenue { color: var(--revenue); background: #ECFDF5; }
    .jtag.support { color: var(--support); background: #FFFBEB; }
    .jtag.offline { color: var(--offline); background: #FFF7ED; }
    .jtag.live { color: #10B981; background: #ECFDF5; }

    .jbar {
      margin-top: 6px;
      height: 4px; border-radius: 999px;
      background: var(--hair);
      position: relative; overflow: hidden;
    }
    .jbar-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      border-radius: 999px;
    }
    .jbar-fill.revenue { background: linear-gradient(90deg, #10B981, #059669); }
    .jbar-fill.support { background: linear-gradient(90deg, #D4A373, #B45309); }
    .jbar-fill.offline { background: linear-gradient(90deg, #F97316, #C2410C); }

    .jmeta { margin-top: 6px; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.02em; }

    .jdetail {
      max-height: 0; overflow: hidden;
      transition: max-height .32s cubic-bezier(.22,.61,.36,1);
    }
    .jrow.open .jdetail { max-height: 400px; }
    .jdetail-inner {
      margin-top: 10px;
      padding: 12px 14px;
      background: #F5F1E8;
      border-radius: 10px;
      font-size: 13.5px;
      color: var(--ink-soft);
      line-height: 1.55;
    }
    .jdetail-inner .lbl { font-size: 9px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
    .jdetail-inner .val-empty { color: var(--muted); font-style: italic; }

    .empty {
      padding: 56px 20px; text-align: center;
      color: var(--muted); font-size: 14px; font-weight: 600;
    }
    .error {
      padding: 14px 16px; border-radius: 12px;
      background: #FEF2F2; color: #991B1B;
      font-size: 13px; font-weight: 700; border: 1px solid #FECACA;
    }
  </style>
</head>
<body>

  <header class="topbar sticky top-0 z-20">
    <div class="mx-auto flex max-w-3xl items-center gap-2 px-4 py-3">
      <a href="/activity-live-board" class="pill-back" aria-label="Back"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="min-w-0 flex-1 text-center">
        <p class="text-[11px] font-bold tracking-[0.18em] uppercase text-slate-500">Person Card</p>
      </div>
      <div class="w-10"></div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 pt-6 pb-28 space-y-6">

    <!-- HERO -->
    <section class="flex items-center gap-4">
      <div id="avatar" class="avatar">—</div>
      <div class="min-w-0 flex-1">
        <h1 id="personName" class="serif text-[28px] sm:text-[32px] leading-[1.05] font-semibold tracking-tight truncate">Loading…</h1>
        <div class="mt-1 flex items-center gap-2 text-[12.5px] font-semibold text-slate-600">
          <span id="liveStatusDot" class="live-pulse hidden"></span>
          <span id="personMeta" class="truncate">—</span>
        </div>
      </div>
    </section>

    <!-- SCRUBBER -->
    <section id="scrubber" class="scrubber" aria-label="Day selector"></section>

    <!-- RHYTHM RIBBON -->
    <section class="ribbon-wrap">
      <p class="text-[10px] font-black uppercase tracking-[0.22em] text-slate-500">Rhythm · 8 AM → 8 PM</p>
      <div id="ribbon" class="ribbon mt-3"></div>
      <div class="ribbon-axis">
        <span>8 AM</span><span>11</span><span>2 PM</span><span>5</span><span>8 PM</span>
      </div>
    </section>

    <!-- STATS -->
    <section class="stat-row">
      <div>
        <div id="statTasks" class="stat-num tabular">0</div>
        <div class="stat-label">Tasks</div>
      </div>
      <div>
        <div id="statTime" class="stat-num tabular">0<span class="text-[20px] font-normal text-slate-500">m</span></div>
        <div class="stat-label">Logged</div>
      </div>
      <div>
        <div id="statPoints" class="stat-num tabular">0</div>
        <div class="stat-label">Points</div>
      </div>
    </section>

    <!-- NARRATIVE -->
    <section>
      <p id="narrative" class="narrative">Loading the day…</p>
    </section>

    <!-- JOURNEY -->
    <section>
      <p class="text-[10px] font-black uppercase tracking-[0.22em] text-slate-500 mb-1">Journey</p>
      <div id="journey" class="journey"></div>
    </section>

  </main>

  <script>
    const linkedUser = decodeURIComponent(location.pathname.split('/').pop());
    const TIER_LABEL = { revenue: 'Revenue', support: 'Support', offline: 'Break' };
    const WINDOW_START_H = 8;
    const WINDOW_END_H = 20;
    const WINDOW_MINS = (WINDOW_END_H - WINDOW_START_H) * 60;

    function escapeHtml(v) {
      return String(v ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    function initialsOf(name) {
      const trimmed = String(name || '').trim();
      if (!trimmed) return '—';
      const parts = trimmed.split(/\s+/).filter(Boolean).slice(0, 2);
      return parts.map(p => p[0].toUpperCase()).join('') || trimmed[0].toUpperCase();
    }

    function displayName(person) {
      if (person?.agent_name) return person.agent_name;
      if (person?.email) return person.email.split('@')[0];
      const demoNames = {
        demo_v2_david: 'David', demo_v2_robert: 'Robert', demo_v2_chang: 'Chang',
        demo_v2_denise: 'Denise', demo_v2_amanda: 'Amanda', demo_v2_meiling: 'Mei Ling',
        demo_v2_farid: 'Farid'
      };
      return demoNames[person?.linked_user] || person?.linked_user || linkedUser;
    }

    function localDateValue(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function todayValue() { return localDateValue(new Date()); }

    function timeLabel(v) {
      return v ? new Date(v).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'now';
    }

    function shortTime(v) {
      if (!v) return 'now';
      const d = new Date(v);
      const hours = d.getHours();
      const minutes = d.getMinutes();
      const h12 = ((hours + 11) % 12) + 1;
      return `${h12}:${String(minutes).padStart(2, '0')}`;
    }

    function formatHoursMinutes(totalMins) {
      const m = Math.max(0, Math.round(totalMins || 0));
      if (m < 60) return `${m}m`;
      const h = Math.floor(m / 60);
      const rem = m % 60;
      return rem ? `${h}h ${rem}m` : `${h}h`;
    }

    async function requestJson(url) {
      const response = await fetch(url, { credentials: 'same-origin' });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || result.success === false) throw new Error(result.error || 'Request failed');
      return result.data;
    }

    // ---------- Date scrubber ----------
    let selectedDate = todayValue();

    function renderScrubber() {
      const container = document.getElementById('scrubber');
      const today = new Date();
      const dates = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        dates.push(d);
      }
      container.innerHTML = dates.map(d => {
        const value = localDateValue(d);
        const isToday = value === todayValue();
        const dow = d.toLocaleDateString([], { weekday: 'short' }).toUpperCase().slice(0, 3);
        const day = d.getDate();
        const active = value === selectedDate ? 'active' : '';
        return `
          <button type="button" class="scrubber-pill ${active}" data-date="${value}">
            <div class="scrubber-dow">${isToday ? 'TODAY' : dow}</div>
            <div class="scrubber-day tabular">${day}</div>
          </button>
        `;
      }).join('');

      container.querySelectorAll('.scrubber-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          selectedDate = pill.dataset.date;
          renderScrubber();
          loadDay();
        });
      });
    }

    // ---------- Rhythm Ribbon ----------
    function renderRibbon(reports) {
      const ribbon = document.getElementById('ribbon');
      if (!reports.length) {
        ribbon.innerHTML = '';
        return;
      }

      const day = selectedDate;
      const dayStart = new Date(`${day}T00:00:00`);
      const windowStart = new Date(dayStart.getTime() + WINDOW_START_H * 60 * 60 * 1000);
      const windowEnd = new Date(dayStart.getTime() + WINDOW_END_H * 60 * 60 * 1000);

      const segs = reports.map(row => {
        const start = new Date(row.started_at);
        const end = row.ended_at ? new Date(row.ended_at) : new Date();
        const clampedStart = start < windowStart ? windowStart : start;
        const clampedEnd = end > windowEnd ? windowEnd : end;
        if (clampedEnd <= windowStart || clampedStart >= windowEnd) return null;
        const leftPct = ((clampedStart - windowStart) / 60000) / WINDOW_MINS * 100;
        const widthPct = Math.max(0.4, ((clampedEnd - clampedStart) / 60000) / WINDOW_MINS * 100);
        const isLive = !row.ended_at;
        return `<div class="ribbon-seg ${row.value_tier || 'support'} ${isLive ? 'live' : ''}"
                      style="left:${leftPct}%; width:${widthPct}%"
                      title="${escapeHtml(row.task_title)} · ${shortTime(row.started_at)}–${isLive ? 'now' : shortTime(row.ended_at)}"></div>`;
      }).filter(Boolean);

      ribbon.innerHTML = segs.join('');
    }

    // ---------- Narrative ----------
    function buildNarrative(person, reports) {
      if (!reports.length) return 'No activity recorded for this day.';
      const name = displayName(person);
      const first = reports[0];
      const rest = reports.slice(1);
      const isBreak = t => /break|lunch/i.test(t || '');
      const firstVerb = isBreak(first.task_title) ? 'took' : 'started on';
      const parts = [
        `<span class="hi">${escapeHtml(name)}</span> began the day at <span class="tm">${shortTime(first.started_at)}</span>, ${firstVerb} <span class="hi">${escapeHtml(first.task_title)}</span> for ${formatHoursMinutes(first.duration_minutes)}`
      ];
      rest.forEach(r => {
        const verb = isBreak(r.task_title) ? 'paused for' : 'moved to';
        const tail = r.ended_at ? `for ${formatHoursMinutes(r.duration_minutes)}` : 'and is still there now';
        parts.push(`then at <span class="tm">${shortTime(r.started_at)}</span> ${verb} <span class="hi">${escapeHtml(r.task_title)}</span> ${tail}`);
      });
      return parts.join(', ') + '.';
    }

    // ---------- Journey ----------
    function renderJourney(reports) {
      const container = document.getElementById('journey');
      if (!reports.length) {
        container.innerHTML = '<div class="empty">Nothing recorded for this day.</div>';
        return;
      }
      const maxMins = Math.max(...reports.map(r => Number(r.duration_minutes || 0)), 1);

      container.innerHTML = reports.map((row, i) => {
        const tier = row.value_tier || 'support';
        const isLive = !row.ended_at;
        const mins = Number(row.duration_minutes || 0);
        const widthPct = Math.max(4, (mins / maxMins) * 100);
        const tagText = isLive ? 'LIVE' : TIER_LABEL[tier];
        const tagCls = isLive ? 'live' : tier;
        const detailText = (row.detail_text || '').trim();
        return `
          <article class="jrow" data-idx="${i}">
            <div>
              <div class="jtime tabular">${shortTime(row.started_at)}</div>
              <div class="jtime-end">${isLive ? 'NOW' : `→ ${shortTime(row.ended_at)}`}</div>
            </div>
            <div>
              <div>
                <span class="jtitle">${escapeHtml(row.task_title)}</span>
                <span class="jtag ${tagCls}">${tagText}</span>
              </div>
              <div class="jbar"><div class="jbar-fill ${tier}" style="width:${widthPct}%"></div></div>
              <div class="jmeta tabular">${formatHoursMinutes(mins)} · ${row.task_point || 0} pt${isLive ? '' : ` · ${escapeHtml(row.end_reason || 'ended')}`}</div>
              <div class="jdetail">
                <div class="jdetail-inner">
                  <div class="lbl">Detail</div>
                  <div class="mt-1 ${detailText ? '' : 'val-empty'}">${detailText ? escapeHtml(detailText) : 'No detail entered.'}</div>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join('');

      container.querySelectorAll('.jrow').forEach(row => {
        row.addEventListener('click', () => row.classList.toggle('open'));
      });
    }

    // ---------- Header ----------
    function renderHeader(person, reports) {
      const name = displayName(person);
      document.getElementById('personName').textContent = name;
      document.getElementById('avatar').textContent = initialsOf(name);

      const live = reports.find(r => !r.ended_at);
      const dot = document.getElementById('liveStatusDot');
      const meta = document.getElementById('personMeta');
      if (live) {
        dot.classList.remove('hidden');
        meta.textContent = `Working now · ${live.task_title} · ${formatHoursMinutes(live.duration_minutes)} in`;
      } else {
        dot.classList.add('hidden');
        const dateStr = new Date(`${selectedDate}T00:00:00`).toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
        meta.textContent = `${person?.email || person?.linked_user || linkedUser} · ${dateStr}`;
      }
    }

    function renderStats(totals, reports) {
      document.getElementById('statTasks').textContent = reports.length;
      document.getElementById('statTime').innerHTML = formatHoursMinutes(totals.minutes || 0).replace(/(\d+)(h|m)/g, '$1<span class="text-[20px] font-normal text-slate-500">$2</span>');
      document.getElementById('statPoints').textContent = totals.points || 0;
    }

    // ---------- Loader ----------
    async function loadDay() {
      try {
        const data = await requestJson(`/api/activity-v2/person/${encodeURIComponent(linkedUser)}/timeline?date=${encodeURIComponent(selectedDate)}`);
        const reports = data.reports || [];
        renderHeader(data.person || {}, reports);
        renderRibbon(reports);
        renderStats(data.totals || { minutes: 0, points: 0 }, reports);
        document.getElementById('narrative').innerHTML = buildNarrative(data.person || {}, reports);
        renderJourney(reports);
      } catch (error) {
        document.getElementById('journey').innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderScrubber();
      loadDay();
      // Keep the live pulse fresh without disrupting the UI mid-scroll
      setInterval(() => { if (selectedDate === todayValue()) loadDay(); }, 60000);
    });
  </script>
</body>
</html>
