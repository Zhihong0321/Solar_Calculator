<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Live Activity Board | ETERNALGY OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { font-family: Inter, sans-serif; box-sizing: border-box; }
    body { margin: 0; background: #f8fafc; color: #0f172a; }
    .btn { border-radius: 8px; padding: 11px 14px; font-size: 13px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-soft { background: #e2e8f0; color: #0f172a; }
    .worker-chip {
      min-width: 0;
      border: 1px solid #1d4ed8;
      background: #2563eb;
      color: #ffffff;
      animation: workBreath 1.8s ease-in-out infinite;
    }
    .worker-chip.break-chip {
      border-color: #c2410c;
      background: #ea580c;
      color: #ffffff;
      animation-name: breakBreath;
    }
    .worker-chip.stale-chip {
      border-color: #b91c1c;
      background: #dc2626;
      animation-name: staleBreath;
    }
    @keyframes workBreath {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.28); transform: scale(1); filter: saturate(1); }
      50% { box-shadow: 0 0 0 7px rgba(37, 99, 235, 0.22); transform: scale(1.025); filter: saturate(1.25); }
    }
    @keyframes breakBreath {
      0%, 100% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.30); transform: scale(1); filter: saturate(1); }
      50% { box-shadow: 0 0 0 7px rgba(234, 88, 12, 0.24); transform: scale(1.025); filter: saturate(1.25); }
    }
    @keyframes staleBreath {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.36); transform: scale(1); filter: saturate(1.1); }
      50% { box-shadow: 0 0 0 8px rgba(220, 38, 38, 0.30); transform: scale(1.035); filter: saturate(1.45); }
    }
  </style>
</head>
<body>
  <header class="sticky top-0 z-20 border-b border-slate-200 bg-white px-4 py-4">
    <div class="mx-auto flex max-w-5xl items-center justify-between gap-3">
      <a href="/agent/home" class="btn btn-soft"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="min-w-0 flex-1">
        <h1 class="text-lg font-extrabold">Live Activity Board</h1>
        <p id="liveMeta" class="text-xs font-semibold text-slate-500">Loading...</p>
      </div>
      <button class="btn btn-soft" onclick="loadBoard()"><i class="fa-solid fa-rotate"></i></button>
    </div>
  </header>

  <main class="mx-auto max-w-5xl space-y-4 p-4 pb-24">
    <section class="grid grid-cols-2 gap-3">
      <div class="rounded-lg border border-slate-200 bg-white p-4">
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Active</p>
        <p id="activeCount" class="mt-1 text-3xl font-black">0</p>
      </div>
      <div class="rounded-lg border border-slate-200 bg-white p-4">
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Today Rows</p>
        <p id="todayCount" class="mt-1 text-3xl font-black">0</p>
      </div>
    </section>
    <section id="boardList" class="space-y-3"></section>
  </main>

  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function timeLabel(value) {
      return value ? new Date(value).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
    }

    function displayAgentName(row) {
      if (row.agent_name || row.email) return row.agent_name || row.email;
      const demoNames = {
        demo_v2_david: 'David Demo',
        demo_v2_robert: 'Robert Demo',
        demo_v2_chang: 'Chang Demo',
        demo_v2_denise: 'Denise Demo',
        demo_v2_amanda: 'Amanda Demo',
        demo_v2_meiling: 'Mei Ling Demo',
        demo_v2_farid: 'Farid Demo'
      };
      return demoNames[row.linked_user] || row.linked_user;
    }

    async function requestJson(url) {
      const response = await fetch(url, { credentials: 'same-origin' });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || result.success === false) throw new Error(result.error || 'Request failed');
      return result.data;
    }

    async function loadBoard() {
      const list = document.getElementById('boardList');
      list.innerHTML = '<div class="py-8 text-center text-sm font-bold text-slate-400">Loading...</div>';
      try {
        const data = await requestJson('/api/activity-v2/live-board');
        document.getElementById('activeCount').textContent = data.active.length;
        document.getElementById('todayCount').textContent = data.today.length;
        document.getElementById('liveMeta').textContent = `Updated ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        const taskGroups = Object.values(data.byTask || {})
          .sort((a, b) => (Number(a.displayOrder || 9999) - Number(b.displayOrder || 9999)) || String(a.taskTitle).localeCompare(String(b.taskTitle)));
        list.innerHTML = taskGroups.length ? taskGroups.map(renderTaskGroup).join('') : '<div class="rounded-lg border border-dashed border-slate-300 bg-white p-6 text-center text-sm font-bold text-slate-400">No active task</div>';
      } catch (error) {
        list.innerHTML = `<div class="rounded-lg border border-rose-200 bg-rose-50 p-4 text-sm font-bold text-rose-700">${escapeHtml(error.message)}</div>`;
      }
    }

    function renderTaskGroup(group) {
      const taskTitle = group.taskTitle || 'Other Task';
      const rows = group.rows || [];
      return `
        <section class="rounded-lg border border-slate-200 bg-white p-3 sm:p-4">
          <div class="flex items-center justify-between gap-3">
            <h2 class="text-base font-black uppercase tracking-widest sm:text-lg">${escapeHtml(taskTitle)}</h2>
            <span class="rounded-full bg-slate-100 px-3 py-1 text-[10px] font-black uppercase tracking-widest text-slate-500">${rows.length} active</span>
          </div>
          <div class="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-4 xl:grid-cols-5">${rows.map(renderAgent).join('')}</div>
        </section>`;
    }

    function renderAgent(row) {
      const isBreak = /break|lunch/i.test(row.task_title || '');
      const isStaleLunch = /lunch/i.test(row.task_title || '') && Number(row.elapsed_minutes || 0) > 90;
      return `
        <a href="/activity-live-board/person/${encodeURIComponent(row.linked_user)}" class="worker-chip ${isBreak ? 'break-chip' : ''} ${isStaleLunch ? 'stale-chip' : ''} block rounded-lg px-2.5 py-2 no-underline">
          <p class="truncate text-[11px] font-black leading-tight sm:text-xs">${escapeHtml(displayAgentName(row))}</p>
          <p class="mt-0.5 text-[10px] font-bold leading-tight opacity-70">${timeLabel(row.started_at)} · ${row.elapsed_minutes || 0}m · ${escapeHtml(row.department || 'general')}</p>
          ${isStaleLunch ? '<p class="mt-1 rounded bg-white/20 px-1.5 py-0.5 text-[9px] font-black uppercase tracking-wide text-white">Maybe not updating</p>' : ''}
        </a>`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadBoard();
      setInterval(loadBoard, 60000);
    });
  </script>
</body>
</html>
