<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=yes" />
    <link rel="icon" href="data:," />
    <title>Solar Proposal 2026_Tiger Neo 3</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #070707;
            --card: #111111;
            --line: rgba(255, 255, 255, 0.12);
            --text: #f3f3f3;
            --muted: rgba(255, 255, 255, 0.68);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(255, 170, 64, 0.15), transparent 32%),
                linear-gradient(180deg, #101010 0%, var(--bg) 38%, #020202 100%);
            color: var(--text);
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body.zoom-active #slides {
            scroll-snap-type: none;
        }

        #slides {
            height: 100svh;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            overscroll-behavior-y: contain;
        }

        #slides::-webkit-scrollbar {
            display: none;
        }

        .slide {
            min-height: 100svh;
            padding: 0;
            display: grid;
            place-items: center;
            scroll-snap-align: start;
            scroll-snap-stop: always;
        }

        .slide-shell {
            width: min(100vw, calc(100svh * 9 / 16));
            aspect-ratio: 9 / 16;
            position: relative;
            overflow: hidden;
            background: #000;
            box-shadow: var(--shadow);
        }

        .slide-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 9%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            padding: 0 20px;
            z-index: 3;
        }

        .slide-overlay[hidden] {
            display: none;
        }

        .slide-overlay-card {
            width: min(90vw, 520px);
            padding: 18px 20px;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.68));
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            text-align: left;
        }

        .slide-overlay-kicker {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.62);
            margin-bottom: 10px;
        }

        .slide-overlay-name {
            font-size: 30px;
            line-height: 1.05;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin: 0 0 8px 0;
        }

        .slide-overlay-address {
            font-size: 14px;
            line-height: 1.55;
            color: rgba(255, 255, 255, 0.84);
            white-space: pre-line;
            margin: 0 0 14px 0;
        }

        .slide-overlay-system {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
        }

        .slide-overlay-system-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
        }

        .slide-overlay-system-value {
            font-size: 18px;
            line-height: 1.2;
            font-weight: 700;
            color: #fff;
        }

        .zoomable {
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
            will-change: transform;
            touch-action: manipulation;
        }

        .zoomable img {
            width: 100%;
            height: 100%;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        .hud {
            position: fixed;
            inset: env(safe-area-inset-top, 0) 0 auto 0;
            padding: 14px 14px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .chip {
            background: rgba(17, 17, 17, 0.72);
            border: 1px solid var(--line);
            color: var(--muted);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 999px;
            padding: 10px 14px;
            box-shadow: var(--shadow);
        }

        .title-chip {
            max-width: calc(100vw - 140px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .count-chip {
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }

        .hint {
            position: fixed;
            left: 50%;
            bottom: calc(16px + env(safe-area-inset-bottom, 0));
            transform: translateX(-50%);
            z-index: 10;
            font-size: 12px;
            text-align: center;
            transition: opacity 0.35s ease;
        }

        .hint.is-hidden {
            opacity: 0;
        }

        @media (orientation: landscape) {
            .slide {
                padding: 12px;
            }

            .slide-shell {
                max-height: calc(100svh - 24px);
            }
        }

        @media (max-width: 640px) {
            .slide-overlay {
                bottom: 7%;
            }

            .slide-overlay-card {
                width: min(92vw, 420px);
                padding: 16px 16px;
                border-radius: 18px;
            }

            .slide-overlay-name {
                font-size: 22px;
            }

            .slide-overlay-address {
                font-size: 13px;
            }

            .slide-overlay-system-value {
                font-size: 16px;
            }
        }
    </style>
</head>

    <script>
        (() => {
            const presentationParams = new URLSearchParams(window.location.search);
            const customerName = presentationParams.get('customer_name') || '';
            const customerAddress = presentationParams.get('customer_address') || '';
            const panelQty = parseFloat(presentationParams.get('panel_qty') || '');
            const panelRating = parseFloat((presentationParams.get('panel_rating') || '').replace(/[^\d.]/g, ''));
            const systemSizeKwpFromUrl = parseFloat(presentationParams.get('system_size_kwp') || '');
            const derivedSystemSizeKwp = Number.isFinite(panelQty) && Number.isFinite(panelRating) && panelQty > 0 && panelRating > 0
                ? (panelQty * panelRating) / 1000
                : systemSizeKwpFromUrl;
            const systemSizeLabel = Number.isFinite(derivedSystemSizeKwp) && derivedSystemSizeKwp > 0
                ? Number.isFinite(panelQty) && Number.isFinite(panelRating) && panelQty > 0 && panelRating > 0
                    ? `${panelQty.toLocaleString(undefined, { maximumFractionDigits: 0 })} x ${panelRating.toLocaleString(undefined, { maximumFractionDigits: 0 })}W = ${derivedSystemSizeKwp.toFixed(2)} kWp`
                    : `${derivedSystemSizeKwp.toFixed(2)} kWp`
                : '';

            const proposalOverlay = document.getElementById('proposalOverlay');
            const proposalCustomerName = document.getElementById('proposalCustomerName');
            const proposalCustomerAddress = document.getElementById('proposalCustomerAddress');
            const proposalSystemWrap = document.getElementById('proposalSystemWrap');
            const proposalSystemValue = document.getElementById('proposalSystemValue');

            if (customerName || customerAddress || systemSizeLabel) {
                proposalCustomerName.textContent = customerName || 'Valued Customer';

                if (customerAddress) {
                    proposalCustomerAddress.textContent = customerAddress;
                    proposalCustomerAddress.hidden = false;
                }

                if (systemSizeLabel) {
                    proposalSystemValue.textContent = systemSizeLabel;
                    proposalSystemWrap.hidden = false;
                }

                proposalOverlay.hidden = false;
            }

            const container = document.getElementById('slides');
            const counter = document.getElementById('counter');
            const hint = document.getElementById('hint');
            const sections = Array.from(container.querySelectorAll('.slide'));
            const totalSlides = sections.length;
            let activeIndex = 0;

            const updateCounter = (index) => {
                activeIndex = index;
                counter.textContent = `${index + 1} / ${totalSlides}`;
            };

            const observer = new IntersectionObserver((entries) => {
                const visible = entries
                    .filter((entry) => entry.isIntersecting)
                    .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
                if (!visible) return;
                const index = sections.indexOf(visible.target);
                if (index >= 0) updateCounter(index);
            }, {
                root: container,
                threshold: [0.55, 0.75],
            });

            sections.forEach((section) => observer.observe(section));

            const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

            const resetHint = () => {
                hint.classList.add('is-hidden');
            };

            const applyZoom = (zoomable, state) => {
                const shell = zoomable.parentElement;
                const maxX = 0;
                const maxY = 0;
                const minX = Math.min(0, shell.clientWidth - shell.clientWidth * state.scale);
                const minY = Math.min(0, shell.clientHeight - shell.clientHeight * state.scale);
                state.tx = state.scale === 1 ? 0 : clamp(state.tx, minX, maxX);
                state.ty = state.scale === 1 ? 0 : clamp(state.ty, minY, maxY);
                zoomable.style.transform = `translate(${state.tx}px, ${state.ty}px) scale(${state.scale})`;
                document.body.classList.toggle('zoom-active', state.scale > 1.01);
            };

            const midpoint = (touches, rect) => {
                return {
                    x: ((touches[0].clientX + touches[1].clientX) / 2) - rect.left,
                    y: ((touches[0].clientY + touches[1].clientY) / 2) - rect.top,
                };
            };

            const distance = (touches) => {
                const dx = touches[0].clientX - touches[1].clientX;
                const dy = touches[0].clientY - touches[1].clientY;
                return Math.hypot(dx, dy);
            };

            container.querySelectorAll('.zoomable').forEach((zoomable) => {
                const state = {
                    scale: 1,
                    tx: 0,
                    ty: 0,
                    dragStartX: 0,
                    dragStartY: 0,
                    dragOriginX: 0,
                    dragOriginY: 0,
                    pinchStartScale: 1,
                    pinchStartDistance: 0,
                    pinchStartTx: 0,
                    pinchStartTy: 0,
                    pinchAnchorX: 0,
                    pinchAnchorY: 0,
                    dragging: false,
                    pinching: false,
                };

                const resetZoom = () => {
                    state.scale = 1;
                    state.tx = 0;
                    state.ty = 0;
                    state.dragging = false;
                    state.pinching = false;
                    applyZoom(zoomable, state);
                };

                zoomable.parentElement.addEventListener('dblclick', () => {
                    resetZoom();
                    resetHint();
                });

                zoomable.addEventListener('touchstart', (event) => {
                    if (event.touches.length === 2) {
                        const rect = zoomable.parentElement.getBoundingClientRect();
                        const anchor = midpoint(event.touches, rect);
                        state.pinching = true;
                        state.dragging = false;
                        state.pinchStartScale = state.scale;
                        state.pinchStartDistance = distance(event.touches);
                        state.pinchStartTx = state.tx;
                        state.pinchStartTy = state.ty;
                        state.pinchAnchorX = (anchor.x - state.tx) / state.scale;
                        state.pinchAnchorY = (anchor.y - state.ty) / state.scale;
                        resetHint();
                    } else if (event.touches.length === 1 && state.scale > 1.01) {
                        state.dragging = true;
                        state.pinching = false;
                        state.dragStartX = event.touches[0].clientX;
                        state.dragStartY = event.touches[0].clientY;
                        state.dragOriginX = state.tx;
                        state.dragOriginY = state.ty;
                        resetHint();
                    }
                }, { passive: true });

                zoomable.addEventListener('touchmove', (event) => {
                    if (event.touches.length === 2 && state.pinching) {
                        event.preventDefault();
                        const rect = zoomable.parentElement.getBoundingClientRect();
                        const anchor = midpoint(event.touches, rect);
                        const nextScale = clamp(
                            state.pinchStartScale * (distance(event.touches) / Math.max(state.pinchStartDistance, 1)),
                            1,
                            4
                        );
                        state.scale = nextScale;
                        state.tx = anchor.x - state.pinchAnchorX * nextScale;
                        state.ty = anchor.y - state.pinchAnchorY * nextScale;
                        applyZoom(zoomable, state);
                    } else if (event.touches.length === 1 && state.dragging && state.scale > 1.01) {
                        event.preventDefault();
                        state.tx = state.dragOriginX + (event.touches[0].clientX - state.dragStartX);
                        state.ty = state.dragOriginY + (event.touches[0].clientY - state.dragStartY);
                        applyZoom(zoomable, state);
                    }
                }, { passive: false });

                zoomable.addEventListener('touchend', () => {
                    if (state.scale <= 1.01) {
                        resetZoom();
                    } else {
                        state.dragging = false;
                        state.pinching = false;
                        applyZoom(zoomable, state);
                    }
                });

                window.addEventListener('resize', () => applyZoom(zoomable, state));
                applyZoom(zoomable, state);
            });

            window.addEventListener('keydown', (event) => {
                if (!['ArrowDown', 'ArrowUp', 'PageDown', 'PageUp', 'Space'].includes(event.key)) return;
                event.preventDefault();
                const delta =
                    event.key === 'ArrowUp' || event.key === 'PageUp' ? -1 : 1;
                const next = clamp(activeIndex + delta, 0, sections.length - 1);
                sections[next].scrollIntoView({ behavior: 'smooth', block: 'start' });
                resetHint();
            });

            container.addEventListener('scroll', resetHint, { passive: true });
            setTimeout(() => hint.classList.add('is-hidden'), 2800);
        })();
    </script>
