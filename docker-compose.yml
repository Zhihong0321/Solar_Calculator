services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL outside the repo before starting docker compose}
      - PORT=3000
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - solar_storage:/usr/src/app/storage

volumes:
  solar_storage:
